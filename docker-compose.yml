services:
  postgres:
    image: postgres:15
    container_name: postgres_db
    environment:
      POSTGRES_DB: workforce_db
      POSTGRES_USER: workforce_user
      POSTGRES_PASSWORD: workforce123
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U workforce_user -d workforce_db" ]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7
    container_name: redis_cache
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    #image: dilshaddkhan23/workforce-app:latest
    build: .
    platform: linux/amd64
    container_name: workforce_app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:

      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/workforce_db
      SPRING_DATASOURCE_USERNAME: workforce_user
      SPRING_DATASOURCE_PASSWORD: workforce123
      SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: 30000
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      JAVA_TOOL_OPTIONS: "-Dspring.main.application-startup=buffering:2048"
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,startup
      MANAGEMENT_ENDPOINT_STARTUP_ENABLED: true
      MANAGEMENT_SERVER_PORT: 8080

    ports:
      - "8080:8080"
volumes:
    postgres_data: