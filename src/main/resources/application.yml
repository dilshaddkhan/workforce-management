spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/workforce_db
    username: workforce_user
    password: workforce123
  application:
    name: workforce-app

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: redis
      port: 6379
  main:
    application-startup: buffer:2048

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,startup
  endpoint:
    startup:
      enabled: true
  server:
    port: 8080

jwt:
  secret-key: 1234567890123456789012345678901234567890123456789012345678901234
  expiration: 86400000